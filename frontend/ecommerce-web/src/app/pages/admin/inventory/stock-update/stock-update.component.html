<section class="app-page">
  <header>
    <p class="app-eyebrow">Inventory management</p>
    <h1 class="app-title">Stock update screen</h1>
    <p class="app-subtitle">Patch available quantity for an existing product inventory record.</p>
  </header>
  <form class="app-panel" [formGroup]="form" (ngSubmit)="submit()">
    <div class="app-panel-body app-form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Product ID</mat-label>
        <input matInput type="number" formControlName="productId" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Available Quantity</mat-label>
        <input matInput type="number" formControlName="availableQuantity" />
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit">
        <mat-icon>save</mat-icon>
        Update Stock
      </button>
    </div>
  </form>
  @if (updated(); as item) {
    <article class="app-panel">
      <div class="app-panel-body result">
        <mat-icon>check_circle</mat-icon>
        <span>Product {{ item.productId }} now has {{ item.availableQuantity }} units at {{ item.warehouseLocation }}.</span>
      </div>
    </article>
  }
</section>
