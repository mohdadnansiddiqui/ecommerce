<section class="app-page">
  @if (product(); as item) {
    <section class="details-grid">
      <article class="app-panel image-panel">
        <img [src]="item.imageUrl || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop'" alt="" />
      </article>
      <article class="app-panel">
        <div class="app-panel-body detail">
          <span class="status-pill">{{ item.category }}</span>
          <h1>{{ item.name }}</h1>
          <p>{{ item.description }}</p>
          <strong>{{ item.price | currency:'INR' }}</strong>
          <form class="cart-form" [formGroup]="form" (ngSubmit)="addToCart()">
            <mat-form-field appearance="outline">
              <mat-label>Customer ID</mat-label>
              <input matInput type="number" formControlName="customerId" />
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Quantity</mat-label>
              <input matInput type="number" formControlName="quantity" />
            </mat-form-field>
            <button mat-flat-button color="primary" type="submit">
              <mat-icon>add_shopping_cart</mat-icon>
              Add to Cart
            </button>
          </form>
        </div>
      </article>
    </section>
  } @else {
    <app-loading-spinner label="Loading product" />
  }
</section>
