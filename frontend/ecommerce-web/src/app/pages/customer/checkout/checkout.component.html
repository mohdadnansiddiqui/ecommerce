<section class="app-page">
  <header>
    <p class="app-eyebrow">Checkout</p>
    <h1 class="app-title">Place an order</h1>
    <p class="app-subtitle">Submit customer and product lines to the existing order-service.</p>
  </header>
  <form class="app-panel" [formGroup]="form" (ngSubmit)="submit()">
    <div class="app-panel-body checkout-grid">
      <mat-form-field appearance="outline">
        <mat-label>Customer ID</mat-label>
        <input matInput type="number" formControlName="customerId" />
      </mat-form-field>
      <div class="lines app-full" formArrayName="items">
        @for (group of items.controls; track $index) {
          <div class="line" [formGroupName]="$index">
            <mat-form-field appearance="outline">
              <mat-label>Product ID</mat-label>
              <input matInput type="number" formControlName="productId" />
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Quantity</mat-label>
              <input matInput type="number" formControlName="quantity" />
            </mat-form-field>
          </div>
        }
      </div>
      <button mat-stroked-button type="button" (click)="addLine()">
        <mat-icon>add</mat-icon>
        Add Line
      </button>
      <button mat-flat-button color="primary" type="submit">Place Order</button>
    </div>
  </form>
</section>
