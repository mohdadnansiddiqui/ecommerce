<section class="app-page">
  <header class="app-page-header">
    <div>
      <p class="app-eyebrow">Update product</p>
      <h1 class="app-title">Edit catalog item</h1>
      <p class="app-subtitle">Update product-service catalog records without changing backend contracts.</p>
    </div>
  </header>

  @if (loading()) {
    <app-loading-spinner label="Loading product editor" />
  } @else {
    <form class="editor-grid" [formGroup]="form" (ngSubmit)="submit()">
      <section class="app-panel">
        <div class="app-panel-body app-form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Category</mat-label>
            <input matInput formControlName="category" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Price</mat-label>
            <input matInput type="number" formControlName="price" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Stock Quantity</mat-label>
            <input matInput type="number" formControlName="stockQuantity" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="app-full">
            <mat-label>Image URL</mat-label>
            <input matInput formControlName="imageUrl" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="app-full">
            <mat-label>Description</mat-label>
            <textarea matInput rows="5" formControlName="description"></textarea>
          </mat-form-field>
          <div class="app-full actions">
            <a mat-stroked-button [routerLink]="['/admin/products', productId]">Cancel</a>
            <button mat-flat-button color="primary" type="submit" [disabled]="saving()">Save Changes</button>
          </div>
        </div>
      </section>
      <aside class="app-panel preview">
        <img [src]="preview() || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop'" alt="" />
        <div class="app-panel-body">
          <strong>Image preview</strong>
          <p class="app-muted">The preview updates as the image URL changes.</p>
        </div>
      </aside>
    </form>
  }
</section>
