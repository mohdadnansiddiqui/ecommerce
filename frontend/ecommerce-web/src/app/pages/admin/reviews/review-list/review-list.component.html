<section class="app-page">
  <header class="app-page-header">
    <div>
      <p class="app-eyebrow">Review management</p>
      <h1 class="app-title">Review list</h1>
      <p class="app-subtitle">Load customer reviews by product using review-service.</p>
    </div>
    <a mat-stroked-button routerLink="/admin/reviews/moderation">Moderation Screen</a>
  </header>
  <section class="app-panel">
    <form class="app-panel-body lookup" [formGroup]="form" (ngSubmit)="load()">
      <mat-form-field appearance="outline">
        <mat-label>Product ID</mat-label>
        <input matInput type="number" formControlName="productId" />
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit">Load Reviews</button>
    </form>
    <app-data-table [columns]="columns" [rows]="rows()" [showViewAction]="false" emptyTitle="Load a product to view reviews" />
  </section>
</section>
