services:
  service-registry:
    build: ./service-registry
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - ecomm-net
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - ecomm-net
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    networks:
      - ecomm-net
  cart-service:
    build: ./cart-service
    container_name: cart-service
    ports:
      - "8084:8084"
    networks:
      - ecomm-net
  customer-service:
    build: ./customer-service
    container_name: customer-service
    ports:
      - "8082:8082"
    networks:
      - ecomm-net
  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8087:8087"
    networks:
      - ecomm-net
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8088:8088"
    networks:
      - ecomm-net
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8085:8085"
    networks:
      - ecomm-net
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8086:8086"
    networks:
      - ecomm-net
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8083:8083"
    networks:
      - ecomm-net
  review-service:
    build: ./review-service
    container_name: review-service
    ports:
      - "8089:8089"
    networks:
      - ecomm-net
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9000:9000"
    networks:
      - ecomm-net
networks:
  ecomm-net:
    driver: bridge
