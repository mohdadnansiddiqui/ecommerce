services:
  service-registry:
    build: ./service-registry
    container_name: service-registry
    ports:
      - "8761:8761"
      - "5015:5005"
    environment:
      CONFIG_URL: http://config-server:8888
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    networks:
      - ecomm-net

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
      - "5014:5005"
    environment:
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_URL: http://config-server:8888
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    depends_on:
      - service-registry
    networks:
      - ecomm-net

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
      - "5008:5005"
    environment:
      EUREKA_URL: http://service-registry:8761/eureka
      CONFIG_URL: http://config-server:8888
      DB_URL: jdbc:postgresql://host.docker.internal:5432/ecommerce_auth
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    depends_on:
      - service-registry
      - config-server
    networks:
      - ecomm-net

