<section class="app-page">
  <header>
    <p class="app-eyebrow">Orders</p>
    <h1 class="app-title">Your orders</h1>
  </header>
  <section class="app-panel">
    <form class="app-panel-body lookup" [formGroup]="form" (ngSubmit)="load()">
      <mat-form-field appearance="outline">
        <mat-label>Customer ID</mat-label>
        <input matInput type="number" formControlName="customerId" />
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit">Load Orders</button>
    </form>
    <app-data-table [columns]="columns" [rows]="rows()" [showViewAction]="false" emptyTitle="Load a customer to see order history" />
  </section>
</section>
